<script>

var _db = null;
var S = null;
var activeTab = "resumen";
var actLog = [];
var sortCol = "pts";
var sortDir = -1;

window.addEventListener("load", function() {
  firebase.initializeApp({
    apiKey: "AIzaSyCBemsmPYqa7nqcvP8YyAOYijzOLJRSMmc",
    authDomain: "eventos-owg.firebaseapp.com",
    projectId: "eventos-owg",
    storageBucket: "eventos-owg.firebasestorage.app",
    messagingSenderId: "751397475474",
    appId: "1:751397475474:web:b9a322adafcbe2b993424b"
  });
  _db = firebase.firestore();
  _db.collection("torneos").doc("torneo_fc26_torneo___fase_2").onSnapshot(function(snap) {
    if (!snap.exists) {
      document.getElementById("cnt").innerHTML = "Sin datos en Firebase. Abre staff_fase2.html primero.";
      return;
    }
    try {
      var raw = snap.data().state;
      S = typeof raw === "string" ? JSON.parse(raw) : raw;
      buildLog();
      renderAll();
      var now = new Date();
      document.getElementById("upd").textContent = "Actualizado: " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    } catch(e) {
      document.getElementById("cnt").innerHTML = "Error: " + e.message;
    }
  }, function(err) {
    document.getElementById("cnt").innerHTML = "Error Firebase: " + err.message;
  });
});

function goTab(id, el) {
  document.querySelectorAll(".pg").forEach(function(p) { p.classList.remove("on"); });
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("on"); });
  document.getElementById("pg-" + id).classList.add("on");
  el.classList.add("on");
  activeTab = id;
  if (S) renderAll();
}

function pad(n) { return String(n).padStart(2, "0"); }
function pn(p) { return p ? (p.alias || p.dorsal) : "?"; }
function pb(id) { if (!S || !S.players) return null; return S.players.find(function(p) { return p.id === id; }); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function gst(grp) {
  if (!grp || !grp.playerIds) return [];
  var st = {};
  grp.playerIds.forEach(function(id) { st[id] = {id:id,pts:0,gf:0,gc:0,w:0,d:0,l:0}; });
  (grp.matches||[]).forEach(function(m) {
    if (!m || m.s1 === null || m.s1 === undefined) return;
    var a = st[m.p1], b = st[m.p2];
    if (!a || !b) return;
    a.gf+=m.s1; a.gc+=m.s2; b.gf+=m.s2; b.gc+=m.s1;
    if (m.s1>m.s2) { a.pts+=3; a.w++; b.l++; }
    else if (m.s1<m.s2) { b.pts+=3; b.w++; a.l++; }
    else { a.pts+=1; b.pts+=1; a.d++; b.d++; }
  });
  return Object.values(st).sort(function(a,b) {
    if (b.pts!==a.pts) return b.pts-a.pts;
    return (b.gf-b.gc)-(a.gf-a.gc);
  });
}

function kow(m) {
  if (m.pen) return m.ps1>m.ps2 ? m.p1 : m.p2;
  return m.s1>=m.s2 ? m.p1 : m.p2;
}

function buildLog() {
  var log = [];
  function scan(matches, label) {
    if (!matches) return;
    matches.forEach(function(m) {
      if (!m || m.s1===null || m.s1===undefined || !m._ts) return;
      log.push({ts:m._ts,label:label,s1:m.s1,s2:m.s2,p1:m.p1,p2:m.p2,staff:m._staff||"",pen:m.pen,ps1:m.ps1,ps2:m.ps2});
    });
  }
  (S.groups1||[]).forEach(function(g) { if(g) scan(g.matches,(g.name||"")+" F1"); });
  (S.groups2||[]).forEach(function(g) { if(g) scan(g.matches,(g.name||"")+" F2"); });
  (S.knockout||[]).forEach(function(r) { if(r) scan(r.matches,r.round||"KO"); });
  log.sort(function(a,b) { return b.ts.localeCompare(a.ts); });
  actLog = log;
}

function renderAll() {
  renderResumen();
  if (activeTab==="grupos") renderGrupos();
  if (activeTab==="bracket") renderBracket();
  if (activeTab==="actividad") renderActividad();
  if (activeTab==="stats") renderStats();
}

function renderResumen() {
  var cnt = document.getElementById("cnt");
  if (!S || !S.phase) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Torneo no iniciado.</div>"; return; }

  var phaseLabels = {"groups1":"Grupos Fase 1","groups2":"Grupos Fase 2","knockout":"Eliminatorias"};
  var label = phaseLabels[S.phase] || S.phase;
  var groups = S.phase==="groups1" ? (S.groups1||[]) : S.phase==="groups2" ? (S.groups2||[]) : null;
  var done=0, total=0;
  if (groups && groups.length) {
    groups.forEach(function(g) {
      if (!g||!g.matches) return;
      g.matches.forEach(function(m) { total++; if(m&&m.s1!==null&&m.s1!==undefined) done++; });
    });
  } else {
    (S.knockout||[]).forEach(function(r) {
      if (!r||!r.matches) return;
      r.matches.forEach(function(m) { total++; if(m&&m._done) done++; });
    });
  }
  var pct = total>0 ? Math.round(done/total*100) : 0;

  var html = "<div style='background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:16px;text-align:center;margin-bottom:14px'>";
  html += "<div style='font-family:Bebas Neue,sans-serif;font-size:26px;color:#FFD700;letter-spacing:1px'>" + esc(label) + "</div>";
  html += "<div style='font-size:13px;color:#6a7a8a;margin-top:4px'>" + done + " de " + total + " partidos completados</div></div>";
  html += "<div style='display:flex;gap:8px;margin-bottom:12px'>";
  html += "<div style='flex:1;background:#182030;border-radius:10px;padding:12px 6px;text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:28px;color:#00FF87'>" + done + "</div><div style='font-size:10px;color:#6a7a8a;font-weight:700;text-transform:uppercase'>Completados</div></div>";
  html += "<div style='flex:1;background:#182030;border-radius:10px;padding:12px 6px;text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:28px;color:#00FF87'>" + (total-done) + "</div><div style='font-size:10px;color:#6a7a8a;font-weight:700;text-transform:uppercase'>Pendientes</div></div>";
  html += "<div style='flex:1;background:#182030;border-radius:10px;padding:12px 6px;text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:28px;color:#00FF87'>" + pct + "%</div><div style='font-size:10px;color:#6a7a8a;font-weight:700;text-transform:uppercase'>Progreso</div></div>";
  html += "</div>";
  html += "<div style='background:#182030;border-radius:4px;height:6px;overflow:hidden;margin:6px 0 16px'><div style='height:100%;background:#00FF87;border-radius:4px;width:" + pct + "%'></div></div>";

  if (actLog.length) {
    html += "<div style='background:#111820;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px;margin-bottom:12px'>";
    html += "<div style='font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;color:#6a7a8a;margin-bottom:10px'>Ultimos resultados</div>";
    actLog.slice(0,5).forEach(function(e) {
      var p1=pb(e.p1), p2=pb(e.p2);
      var pen = e.pen ? " (pen "+e.ps1+"-"+e.ps2+")" : "";
      html += "<div style='padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:13px'>";
      html += "<div style='display:flex;justify-content:space-between;margin-bottom:2px'>";
      html += "<span>"+esc(pn(p1))+" <b>"+e.s1+" - "+e.s2+"</b> "+esc(pn(p2))+pen+"</span>";
      html += "<span style='font-size:11px;color:#6a7a8a'>"+esc(e.ts)+"</span></div>";
      html += "<div style='display:flex;justify-content:space-between'>";
      html += "<span style='font-size:11px;color:#6a7a8a'>"+esc(e.label)+"</span>";
      if(e.staff) html += "<span style='font-size:12px;color:#00FF87'>"+esc(e.staff)+"</span>";
      html += "</div></div>";
    });
    html += "</div>";
  }

  cnt.innerHTML = html;
}

function renderGrupos() {
  var cnt = document.getElementById("cnt-grupos");
  if (!S||!S.phase) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Sin datos</div>"; return; }
  var phases = [];
  if (S.groups1&&S.groups1.length) phases.push({label:"Fase 1",groups:S.groups1});
  if (S.groups2&&S.groups2.length) phases.push({label:"Fase 2",groups:S.groups2});
  if (!phases.length) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Sin grupos</div>"; return; }
  var html = "";
  phases.forEach(function(ph) {
    html += "<div style='font-size:13px;color:#6a7a8a;font-weight:700;text-transform:uppercase;margin-bottom:8px'>"+ph.label+"</div>";
    ph.groups.forEach(function(g) {
      if (!g) return;
      var st = gst(g);
      var done = (g.matches||[]).filter(function(m){return m&&m.s1!==null&&m.s1!==undefined;}).length;
      html += "<div style='background:#111820;border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:10px;overflow:hidden'>";
      html += "<div style='background:#182030;padding:8px 12px;display:flex;justify-content:space-between'>";
      html += "<span style='font-family:Bebas Neue,sans-serif;font-size:18px;color:#00FF87'>"+esc(g.name||"")+"</span>";
      html += "<span style='font-size:12px;font-weight:700;color:#6a7a8a'>"+done+"/"+(g.matches||[]).length+"</span></div>";
      html += "<table style='width:100%;border-collapse:collapse;font-size:13px'><thead><tr>";
      html += "<th style='padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;text-align:left'>#</th>";
      html += "<th style='padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;text-align:left'>Dorsal</th>";
      html += "<th style='padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;text-align:center'>J</th>";
      html += "<th style='padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;text-align:center'>Pts</th>";
      html += "<th style='padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;text-align:center'>GD</th>";
      html += "</tr></thead><tbody>";
      st.forEach(function(s,i) {
        var pl=pb(s.id), gd=s.gf-s.gc;
        html += "<tr style='background:"+(i<2?"rgba(0,255,135,.04)":"")+"'>";
        html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:"+(i<2?"#00FF87":"#6a7a8a")+"'>"+(i<2?"&#8594;":i+1)+"</td>";
        html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:700'>"+esc(pn(pl))+"</td>";
        html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#6a7a8a'>"+(s.w+s.d+s.l)+"</td>";
        html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;font-family:Bebas Neue,sans-serif;font-size:18px;color:#00FF87'>"+s.pts+"</td>";
        html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:"+(gd>0?"#00FF87":gd<0?"#ff4466":"#6a7a8a")+"'>"+(gd>0?"+":"")+gd+"</td>";
        html += "</tr>";
      });
      html += "</tbody></table></div>";
    });
  });
  cnt.innerHTML = html;
}

function renderBracket() {
  var cnt = document.getElementById("cnt-bracket");
  if (!S||!S.knockout||!S.knockout.length) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Disponible desde octavos</div>"; return; }
  var html = "";
  S.knockout.forEach(function(round) {
    if (!round) return;
    var label = (round.isFinal||round.is3rd) ? round.round+" (Bo3)" : (round.round||"");
    html += "<div style='margin-top:10px;font-size:12px;color:#6a7a8a;font-weight:700;text-transform:uppercase;padding-bottom:6px'>"+esc(label)+"</div>";
    (round.matches||[]).forEach(function(m,mi) {
      if (!m) return;
      var p1=pb(m.p1), p2=pb(m.p2), d=m._done, w=d?kow(m):null;
      html += "<div style='display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111820;border:1px solid rgba(255,255,255,0.08);border-radius:10px;margin-bottom:6px"+(d?";border-left:3px solid #00FF87":"")+"'>";
      html += "<div style='flex:1'>";
      html += "<div style='font-weight:700;font-size:14px;color:"+(d&&w===m.p1?"#00FF87":d?"#6a7a8a":"#f0f4f8")+"'>"+esc(p1?pn(p1):"TBD")+"</div>";
      html += "<div style='font-weight:700;font-size:14px;color:"+(d&&w===m.p2?"#00FF87":d?"#6a7a8a":"#f0f4f8")+"'>"+esc(p2?pn(p2):"TBD")+"</div></div>";
      if (d) {
        html += "<div style='text-align:center'>";
        html += "<div style='font-size:18px;color:"+(w===m.p1?"#00FF87":"#ff4466")+"'>"+m.s1+"</div>";
        html += "<div style='font-size:18px;color:"+(w===m.p2?"#00FF87":"#ff4466")+"'>"+m.s2+"</div></div>";
      } else {
        html += "<div style='font-size:11px;color:#6a7a8a;font-weight:700'>PEND</div>";
      }
      html += "</div>";
    });
  });
  cnt.innerHTML = html;
}

function sortStats(col) {
  if (sortCol===col) { sortDir*=-1; } else { sortCol=col; sortDir=-1; }
  renderStats();
}

function renderStats() {
  var cnt = document.getElementById("cnt-stats");
  if (!S||!S.players) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Sin datos</div>"; return; }
  var sm = {};
  S.players.forEach(function(p) { sm[p.id]={id:p.id,j:0,g:0,e:0,d:0,gf:0,gc:0,pts:0}; });
  function proc(matches) {
    if (!matches) return;
    matches.forEach(function(m) {
      if (!m||m.s1===null||m.s1===undefined) return;
      var a=sm[m.p1], b=sm[m.p2];
      if (!a||!b) return;
      a.j++;b.j++;a.gf+=m.s1;a.gc+=m.s2;b.gf+=m.s2;b.gc+=m.s1;
      if(m.s1>m.s2){a.g++;a.pts+=3;b.d++;}
      else if(m.s1<m.s2){b.g++;b.pts+=3;a.d++;}
      else{a.e++;b.e++;a.pts+=1;b.pts+=1;}
    });
  }
  (S.groups1||[]).forEach(function(g){if(g)proc(g.matches);});
  (S.groups2||[]).forEach(function(g){if(g)proc(g.matches);});
  (S.knockout||[]).forEach(function(r){if(r)proc(r.matches);});

  var rows = Object.values(sm).filter(function(r){return r.j>0;});
  rows.sort(function(a,b) {
    var va,vb;
    if(sortCol==="j"){va=a.j;vb=b.j;}
    else if(sortCol==="g"){va=a.g;vb=b.g;}
    else if(sortCol==="e"){va=a.e;vb=b.e;}
    else if(sortCol==="d"){va=a.d;vb=b.d;}
    else if(sortCol==="gf"){va=a.gf;vb=b.gf;}
    else if(sortCol==="gc"){va=a.gc;vb=b.gc;}
    else if(sortCol==="gd"){va=a.gf-a.gc;vb=b.gf-b.gc;}
    else{va=a.pts;vb=b.pts;}
    if(vb!==va) return sortDir*(vb-va);
    return (b.gf-b.gc)-(a.gf-a.gc);
  });

  var html = "<div style='background:#111820;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden'>";
  html += "<table style='width:100%;border-collapse:collapse;font-size:13px'><thead><tr style='background:#182030'>";
  var cols = ["pts","j","g","e","d","gf","gc","gd"];
  var labels = {"pts":"Dorsal","j":"J","g":"G","e":"E","d":"D","gf":"GF","gc":"GC","gd":"GD"};
  cols.forEach(function(col) {
    var arrow = sortCol===col ? (sortDir===-1?" v":" ^") : "";
    var isFirst = col==="pts";
    html += "<th data-col='" + col + "' onclick='sortStats(this.dataset.col)' style='padding:6px "+(isFirst?"8px":"4px")+";border-bottom:1px solid rgba(255,255,255,0.08);color:#6a7a8a;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;text-align:"+(isFirst?"left":"center")+"'>"+(isFirst?"Dorsal":labels[col])+arrow+"</th>";
  });
  html += "</tr></thead><tbody>";
  rows.forEach(function(r,idx) {
    var p=pb(r.id), gd=r.gf-r.gc;
    html += "<tr style='background:"+(idx%2===0?"rgba(0,255,135,.02)":"")+"'>";
    html += "<td style='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.08);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px'>"+esc(p?p.dorsal:"?")+(p&&p.alias?"<br><span style='font-size:11px;color:#6a7a8a'>"+esc(p.alias)+"</span>":"")+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;font-family:Bebas Neue,sans-serif;font-size:18px'>"+r.j+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#00FF87;font-weight:700'>"+r.g+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#FFD700;font-weight:700'>"+r.e+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#ff4466;font-weight:700'>"+r.d+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#6a7a8a'>"+r.gf+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;color:#6a7a8a'>"+r.gc+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;font-weight:700;color:"+(gd>0?"#00FF87":gd<0?"#ff4466":"#6a7a8a")+"'>"+(gd>0?"+":"")+gd+"</td>";
    html += "<td style='padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;font-family:Bebas Neue,sans-serif;font-size:20px;color:#00FF87'>"+r.pts+"</td>";
    html += "</tr>";
  });
  html += "</tbody></table></div>";

  html += "<div style='margin-top:14px'>";
  rows.forEach(function(r) {
    var p=pb(r.id);
    var wp=r.j>0?Math.round(r.g/r.j*100):0;
    var ep=r.j>0?Math.round(r.e/r.j*100):0;
    var lp=r.j>0?Math.round(r.d/r.j*100):0;
    html += "<div style='margin-bottom:10px'>";
    html += "<div style='display:flex;justify-content:space-between;margin-bottom:3px'>";
    html += "<span style='font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:13px'>"+esc(p?pn(p):"?")+" <span style='color:#6a7a8a;font-weight:400'>"+r.j+"J</span></span>";
    html += "<span style='font-size:11px'><span style='color:#00FF87'>"+r.g+"G</span> <span style='color:#FFD700'>"+r.e+"E</span> <span style='color:#ff4466'>"+r.d+"D</span></span></div>";
    html += "<div style='display:flex;height:7px;border-radius:4px;overflow:hidden;background:#182030'>";
    html += "<div style='width:"+wp+"%;background:#00FF87'></div>";
    html += "<div style='width:"+ep+"%;background:#FFD700'></div>";
    html += "<div style='width:"+lp+"%;background:#ff4466'></div>";
    html += "</div></div>";
  });
  html += "</div>";
  cnt.innerHTML = html;
}

function renderActividad() {
  var cnt = document.getElementById("cnt-act");
  if (!actLog.length) { cnt.innerHTML = "<div style='text-align:center;padding:40px;color:#6a7a8a'>Sin actividad</div>"; return; }
  var html = "<div style='background:#111820;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px'>";
  actLog.forEach(function(e) {
    var p1=pb(e.p1), p2=pb(e.p2);
    var pen = e.pen ? " (pen "+e.ps1+"-"+e.ps2+")" : "";
    var c1=e.s1>e.s2?"#00FF87":e.s1<e.s2?"#ff4466":"#FFD700";
    var c2=e.s2>e.s1?"#00FF87":e.s2<e.s1?"#ff4466":"#FFD700";
    html += "<div style='padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:13px'>";
    html += "<div style='display:flex;justify-content:space-between;margin-bottom:3px'>";
    html += "<span><b>"+esc(pn(p1))+"</b> <span style='font-size:18px;color:"+c1+"'>"+e.s1+"</span> - <span style='font-size:18px;color:"+c2+"'>"+e.s2+"</span> <b>"+esc(pn(p2))+"</b>"+pen+"</span>";
    html += "<span style='font-size:11px;color:#6a7a8a'>"+esc(e.ts)+"</span></div>";
    html += "<div style='display:flex;justify-content:space-between'>";
    html += "<span style='font-size:11px;color:#6a7a8a'>"+esc(e.label)+"</span>";
    if(e.staff) html += "<span style='font-size:12px;color:#00FF87'>"+esc(e.staff)+"</span>";
    html += "</div></div>";
  });
  html += "</div>";
  cnt.innerHTML = html;
}

</script>
